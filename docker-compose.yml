version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: "healthcare_secret_key_change_in_prod"
    # Pipeline env vars forwarded to DAG workers
    POSTGRES_HOST:     postgres
    POSTGRES_PORT:     "5432"
    POSTGRES_DB:       ${POSTGRES_DB:-healthcare}
    POSTGRES_USER:     ${POSTGRES_USER:-postgres}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    OLLAMA_BASE_URL:   http://ollama:11434
    OLLAMA_MODEL:      ${OLLAMA_MODEL:-llama3}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./dbt:/opt/airflow/dbt
    - ./data:/opt/airflow/data
    - ./ingestion:/opt/airflow/ingestion
    - ./scripts:/opt/airflow/scripts
    - ./requirements.txt:/requirements.txt
  depends_on:
    postgres:
      condition: service_healthy

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: healthcare_postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-healthcare}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/00_create_airflow_db.sh:/docker-entrypoint-initdb.d/00_create_airflow_db.sh
      - ./scripts/01_init_healthcare.sql:/docker-entrypoint-initdb.d/01_init_healthcare.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow — init ─────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: healthcare_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --quiet -r /requirements.txt
        airflow db upgrade
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@healthcare.local || true
    restart: "no"

  # ── Airflow — webserver ────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: healthcare_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow — scheduler ────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: healthcare_airflow_scheduler
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ── FastAPI ────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: healthcare_api
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     "5432"
      POSTGRES_DB:       ${POSTGRES_DB:-healthcare}
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      OLLAMA_BASE_URL:   http://ollama:11434
      OLLAMA_MODEL:      ${OLLAMA_MODEL:-llama3}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app/api
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ── Ollama (local LLM inference) ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: healthcare_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Pull the model on first start
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull ${OLLAMA_MODEL:-llama3} && wait"]
    restart: unless-stopped
    # GPU support — uncomment if using NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  postgres_data:
  ollama_data:

networks:
  default:
    name: healthcare_network
